<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LOTTE rental Logo Assets</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f5f5;
        color: #171717;
      }

      main {
        width: min(860px, calc(100vw - 48px));
        display: grid;
        gap: 24px;
      }

      section {
        display: grid;
        gap: 14px;
        padding: 24px;
        border: 1px solid #dedede;
        border-radius: 8px;
        background: #ffffff;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 24px;
      }

      h2 {
        font-size: 16px;
      }

      img {
        display: block;
        width: min(420px, 100%);
        height: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>LOTTE rental Logo Assets</h1>

      <section>
        <h2>Red</h2>
        <img src="../assets/lotte-rental-logo-red.png" alt="LOTTE rental red logo">
      </section>

      <section>
        <h2>Gray</h2>
        <img src="../assets/lotte-rental-logo-gray.png" alt="LOTTE rental gray logo">
      </section>
    </main>
  </body>
</html>
